<!-- Toggle button -->
<button
  class="fixed top-4 right-4 z-50 bg-gray-800/80 hover:bg-gray-700 text-white px-3 py-2 rounded-lg shadow-lg backdrop-blur-sm cursor-pointer text-sm"
  (click)="toggle()"
>
  {{ open() ? '✕ Close' : '⚙ Scene' }}
</button>

<!-- Panel -->
<div
  class="fixed top-0 right-0 h-full w-96 bg-gray-900/95 text-white backdrop-blur-md shadow-2xl z-40 overflow-y-auto transition-transform duration-300"
  [class.translate-x-full]="!open()"
  [class.translate-x-0]="open()"
>
  <div class="p-4 pt-14 space-y-6">
    <h2 class="text-lg font-bold">Scene Settings</h2>

    <!-- Diffuse Intensity -->
    <div>
      <label class="block text-sm text-gray-400 mb-1">Ambient Brightness</label>
      <input
        type="range"
        min="0"
        max="1"
        step="0.01"
        class="w-full"
        [ngModel]="diffuseIntensity()"
        (ngModelChange)="onDiffuseChange($event)"
      />
      <span class="text-xs text-gray-500">{{ diffuseIntensity() }}</span>
    </div>

    <!-- Spheres -->
    <section>
      <div class="flex items-center justify-between mb-2">
        <h3 class="font-semibold">Spheres</h3>
        <button
          class="text-xs bg-green-600 hover:bg-green-500 px-2 py-1 rounded cursor-pointer"
          (click)="addSphere()"
        >
          + Add
        </button>
      </div>

      @for (sphere of spheres(); track $index) {
        <div
          class="mb-4 p-4 bg-gray-800/80 rounded-xl border border-gray-700 space-y-4 shadow-lg transition-transform hover:-translate-y-0.5"
        >
          <div class="flex items-center justify-between">
            <input
              type="text"
              class="bg-transparent text-sm font-semibold w-full outline-none border-b border-transparent focus:border-blue-400 text-gray-100 placeholder-gray-500 transition-colors"
              [ngModel]="sphere.name"
              (ngModelChange)="onSphereChange($index, 'name', $event)"
              placeholder="Sphere name"
            />
            <button
              class="text-red-400 hover:text-red-300 bg-red-400/10 hover:bg-red-400/20 px-2 py-1 rounded text-xs ml-2 cursor-pointer shrink-0 transition-colors"
              (click)="removeSphere($index)"
            >
              Remove
            </button>
          </div>

          <div class="space-y-1">
            <span class="text-xs text-gray-400 font-medium">Position</span>
            <app-vec3-input
              [value]="sphere.center"
              (valueChange)="onSphereChange($index, 'center', $event)"
            ></app-vec3-input>
          </div>

          <div class="space-y-1">
            <span class="text-xs text-gray-400 font-medium">Radius</span>
            <input
              type="number"
              class="w-full bg-gray-700/50 backdrop-blur-sm rounded border border-gray-600 px-2 py-1 text-sm outline-none focus:border-blue-400 focus:bg-gray-700 transition-colors"
              [ngModel]="sphere.radius"
              (ngModelChange)="onSphereChange($index, 'radius', $event)"
            />
          </div>

          <div class="space-y-1">
            <span class="text-xs text-gray-400 font-medium">Color</span>
            <app-color-input
              [value]="sphere.color"
              (valueChange)="onSphereChange($index, 'color', $event)"
            ></app-color-input>
          </div>
        </div>
      }
    </section>

    <!-- Triangles -->
    <section>
      <div class="flex items-center justify-between mb-2">
        <h3 class="font-semibold">Triangles</h3>
        <button
          class="text-xs bg-green-600 hover:bg-green-500 px-2 py-1 rounded cursor-pointer"
          (click)="addTriangle()"
        >
          + Add
        </button>
      </div>

      @for (triangle of triangles(); track $index) {
        <div
          class="mb-4 p-4 bg-gray-800/80 rounded-xl border border-gray-700 space-y-4 shadow-lg transition-transform hover:-translate-y-0.5"
        >
          <div class="flex items-center justify-between">
            <input
              type="text"
              class="bg-transparent text-sm font-semibold w-full outline-none border-b border-transparent focus:border-blue-400 text-gray-100 placeholder-gray-500 transition-colors"
              [ngModel]="triangle.name"
              (ngModelChange)="onTriangleChange($index, 'name', $event)"
              placeholder="Triangle name"
            />
            <button
              class="text-red-400 hover:text-red-300 bg-red-400/10 hover:bg-red-400/20 px-2 py-1 rounded text-xs ml-2 cursor-pointer shrink-0 transition-colors"
              (click)="removeTriangle($index)"
            >
              Remove
            </button>
          </div>

          <div class="space-y-1">
            <span class="text-xs text-gray-400 font-medium">Point A</span>
            <app-vec3-input
              [value]="triangle.pointA"
              (valueChange)="onTriangleChange($index, 'pointA', $event)"
            ></app-vec3-input>
          </div>

          <div class="space-y-1">
            <span class="text-xs text-gray-400 font-medium">Point B</span>
            <app-vec3-input
              [value]="triangle.pointB"
              (valueChange)="onTriangleChange($index, 'pointB', $event)"
            ></app-vec3-input>
          </div>

          <div class="space-y-1">
            <span class="text-xs text-gray-400 font-medium">Point C</span>
            <app-vec3-input
              [value]="triangle.pointC"
              (valueChange)="onTriangleChange($index, 'pointC', $event)"
            ></app-vec3-input>
          </div>

          <div class="space-y-1">
            <span class="text-xs text-gray-400 font-medium">Color</span>
            <app-color-input
              [value]="triangle.color"
              (valueChange)="onTriangleChange($index, 'color', $event)"
            ></app-color-input>
          </div>
        </div>
      }
    </section>

    <!-- Lights -->
    <section>
      <div class="flex items-center justify-between mb-2">
        <h3 class="font-semibold">Lights</h3>
        <button
          class="text-xs bg-green-600 hover:bg-green-500 px-2 py-1 rounded cursor-pointer"
          (click)="addLight()"
        >
          + Add
        </button>
      </div>

      @for (light of lights(); track $index) {
        <div
          class="mb-4 p-4 bg-gray-800/80 rounded-xl border border-gray-700 space-y-4 shadow-lg transition-transform hover:-translate-y-0.5"
        >
          <div class="flex items-center justify-between">
            <input
              type="text"
              class="bg-transparent text-sm font-semibold w-full outline-none border-b border-transparent focus:border-yellow-400 text-gray-100 placeholder-gray-500 transition-colors"
              [ngModel]="light.name"
              (ngModelChange)="onLightChange($index, 'name', $event)"
              placeholder="Light name"
            />
            <button
              class="text-red-400 hover:text-red-300 bg-red-400/10 hover:bg-red-400/20 px-2 py-1 rounded text-xs ml-2 cursor-pointer shrink-0 transition-colors"
              (click)="removeLight($index)"
            >
              Remove
            </button>
          </div>

          <div class="space-y-1">
            <span class="text-xs text-gray-400 font-medium">Position</span>
            <app-vec3-input
              [value]="light.center"
              (valueChange)="onLightChange($index, 'center', $event)"
            ></app-vec3-input>
          </div>

          <div class="space-y-1">
            <span class="text-xs text-gray-400 font-medium">Color</span>
            <app-color-input
              [value]="light.color"
              (valueChange)="onLightChange($index, 'color', $event)"
            ></app-color-input>
          </div>
        </div>
      }
    </section>
  </div>
</div>
