<div class="grid grid-cols-3 gap-2 text-xs">
  <div>
    <label class="text-zinc-500">{{ labels()[0] || 'X' }}</label>
    <input
      type="number"
      class="w-full bg-zinc-700/50 backdrop-blur-sm rounded border border-zinc-600 px-2 py-1 outline-none focus:border-blue-400 focus:bg-zinc-700 transition-colors"
      [ngModel]="value().x"
      (ngModelChange)="update({ x: $event })"
    />
  </div>
  <div>
    <label class="text-zinc-500">{{ labels()[1] || 'Y' }}</label>
    <input
      type="number"
      class="w-full bg-zinc-700/50 backdrop-blur-sm rounded border border-zinc-600 px-2 py-1 outline-none focus:border-blue-400 focus:bg-zinc-700 transition-colors"
      [ngModel]="value().y"
      (ngModelChange)="update({ y: $event })"
    />
  </div>
  <div>
    <label class="text-zinc-500">{{ labels()[2] || 'Z' }}</label>
    <input
      type="number"
      class="w-full bg-zinc-700/50 backdrop-blur-sm rounded border border-zinc-600 px-2 py-1 outline-none focus:border-blue-400 focus:bg-zinc-700 transition-colors"
      [ngModel]="value().z"
      (ngModelChange)="update({ z: $event })"
    />
  </div>
</div>
