<div class="space-y-2 text-xs text-zinc-400">
  <div class="grid grid-cols-3 gap-2">
    <label>R</label>
    <label>G</label>
    <label>B</label>
  </div>
  <div class="grid grid-cols-3 gap-2">
    <input
      type="number"
      step="0.05"
      min="0"
      max="1"
      class="w-full bg-zinc-700/50 backdrop-blur-sm rounded border border-zinc-600 px-2 py-1 outline-none focus:border-blue-400 focus:bg-zinc-700 transition-colors"
      [ngModel]="value().r"
      (ngModelChange)="update({ r: $event })"
    />
    <input
      type="number"
      step="0.05"
      min="0"
      max="1"
      class="w-full bg-zinc-700/50 backdrop-blur-sm rounded border border-zinc-600 px-2 py-1 outline-none focus:border-blue-400 focus:bg-zinc-700 transition-colors"
      [ngModel]="value().g"
      (ngModelChange)="update({ g: $event })"
    />
    <input
      type="number"
      step="0.05"
      min="0"
      max="1"
      class="w-full bg-zinc-700/50 backdrop-blur-sm rounded border border-zinc-600 px-2 py-1 outline-none focus:border-blue-400 focus:bg-zinc-700 transition-colors"
      [ngModel]="value().b"
      (ngModelChange)="update({ b: $event })"
    />
  </div>
  <!-- Color preview -->
  <div
    class="h-6 rounded border border-zinc-600 shadow-inner"
    [style.background-color]="
      'rgb(' + value().r * 255 + ',' + value().g * 255 + ',' + value().b * 255 + ')'
    "
  ></div>
</div>
